name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: typecheck / test / lint / format / tokens / a11y / perf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests + coverage (blocking, ratchet thresholds in vite.config.ts)
        run: npm run test:coverage

      - name: ESLint custom rule tests
        run: npm run test:rules

      - name: Lint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Verify design tokens mirror
        run: npm run verify:tokens

      - name: Stylelint tokens
        run: npm run lint:tokens

      - name: Build
        run: npm run build

      - name: Verify no placeholders in dist
        run: npm run verify:no-placeholders

      # ------------------------------------------------------------------
      # T-4: accessibility + perf harness
      # ------------------------------------------------------------------

      - name: Verify gate schedule (PRD R-20 / embertide-z40.4)
        run: npm run verify:gate-schedule

      - name: A11y — contrast matrix (blocking)
        run: npm run a11y:contrast

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: A11y — axe-core smoke (blocking)
        run: npm run a11y:axe

      - name: Perf — chest-reveal FPS (warn-only, PRD A-18′)
        run: npm run perf:motion
        continue-on-error: true

      - name: Perf — ambient-board FPS (warn-only, PRD R-15)
        run: npm run perf:ambient
        continue-on-error: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
