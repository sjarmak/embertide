<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pane primitive mock — embertide-b56 phase 1.

  Two color variants (sapphire + emerald) shown side-by-side in two rows:
    Row 1: density=comfortable (4px outer wrap, ≤ 8px budget)
    Row 2: density=compact     (0px outer wrap, ≤ 8px budget)
  Each pane shows the lead-frame border, stained-glass gradient backing,
  and four corner medallions toggled ON.

  Colors mirror the --hc-* tokens enumerated in tokens.css:
    sapphire-300/700 + lead-silver-700 + glow-sapphire
    emerald-300/700 + lead-iron-700    + glow-emerald
    lead-gold-500   — medallion highlight
    shadow-900      — outer drop / medallion shadow
-->
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-label="Pane primitive mock — sapphire and emerald in two densities with corner medallions">
  <defs>
    <linearGradient id="bg-sapphire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e8ccb"/>
      <stop offset="100%" stop-color="#1a2e6e"/>
    </linearGradient>
    <linearGradient id="bg-emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb079"/>
      <stop offset="100%" stop-color="#0f5028"/>
    </linearGradient>
    <radialGradient id="medallion-fill" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#b89142"/>
      <stop offset="70%" stop-color="#5e6775"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <radialGradient id="medallion-fill-iron" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#b89142"/>
      <stop offset="70%" stop-color="#1a1620"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <filter id="glow-sapphire" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page backdrop -->
  <rect x="0" y="0" width="560" height="320" fill="#0b1228"/>

  <!-- Row labels -->
  <g font-family="Cinzel, Georgia, serif" font-size="10" fill="#b7ae95" letter-spacing="1.5">
    <text x="20" y="28">COMFORTABLE · MEDALLIONS ON</text>
    <text x="20" y="188">COMPACT · MEDALLIONS ON</text>
  </g>
  <g font-family="Cinzel, Georgia, serif" font-size="10" fill="#b7ae95" letter-spacing="1.5">
    <text x="80"  y="155">SAPPHIRE</text>
    <text x="320" y="155">EMERALD</text>
  </g>

  <!-- ROW 1 — comfortable (4px outer wrap drawn explicitly as a transparent halo) -->
  <!-- Sapphire pane -->
  <g transform="translate(40,40)">
    <!-- 4px outer-wrap padding visualized as a subtle dotted box -->
    <rect x="-4" y="-4" width="208" height="108" rx="10" ry="10" fill="none" stroke="#3a3322" stroke-dasharray="2 3"/>
    <!-- Lead-frame border + stained-glass gradient backing -->
    <rect x="0" y="0" width="200" height="100" rx="8" ry="8" fill="url(#bg-sapphire)" stroke="#5e6775" stroke-width="1" filter="url(#glow-sapphire)"/>
    <!-- Inner shadow -->
    <rect x="1" y="1" width="198" height="98" rx="7" ry="7" fill="none" stroke="#05080f" stroke-opacity="0.5" stroke-width="2"/>
    <!-- Content placeholder -->
    <text x="100" y="55" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#f6f2e6" letter-spacing="2">SAPPHIRE</text>
    <!-- 4 corner medallions -->
    <circle cx="0"   cy="0"   r="6" fill="url(#medallion-fill)"/>
    <circle cx="200" cy="0"   r="6" fill="url(#medallion-fill)"/>
    <circle cx="0"   cy="100" r="6" fill="url(#medallion-fill)"/>
    <circle cx="200" cy="100" r="6" fill="url(#medallion-fill)"/>
  </g>

  <!-- Emerald pane -->
  <g transform="translate(280,40)">
    <rect x="-4" y="-4" width="208" height="108" rx="10" ry="10" fill="none" stroke="#3a3322" stroke-dasharray="2 3"/>
    <rect x="0" y="0" width="200" height="100" rx="8" ry="8" fill="url(#bg-emerald)" stroke="#1a1620" stroke-width="1" filter="url(#glow-emerald)"/>
    <rect x="1" y="1" width="198" height="98" rx="7" ry="7" fill="none" stroke="#05080f" stroke-opacity="0.5" stroke-width="2"/>
    <text x="100" y="55" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#f6f2e6" letter-spacing="2">EMERALD</text>
    <circle cx="0"   cy="0"   r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="200" cy="0"   r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="0"   cy="100" r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="200" cy="100" r="6" fill="url(#medallion-fill-iron)"/>
  </g>

  <!-- ROW 2 — compact (0px outer wrap; pane chrome only) -->
  <g transform="translate(40,200)">
    <rect x="0" y="0" width="200" height="100" rx="8" ry="8" fill="url(#bg-sapphire)" stroke="#5e6775" stroke-width="1" filter="url(#glow-sapphire)"/>
    <rect x="1" y="1" width="198" height="98" rx="7" ry="7" fill="none" stroke="#05080f" stroke-opacity="0.5" stroke-width="2"/>
    <text x="100" y="55" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#f6f2e6" letter-spacing="2">SAPPHIRE</text>
    <circle cx="0"   cy="0"   r="6" fill="url(#medallion-fill)"/>
    <circle cx="200" cy="0"   r="6" fill="url(#medallion-fill)"/>
    <circle cx="0"   cy="100" r="6" fill="url(#medallion-fill)"/>
    <circle cx="200" cy="100" r="6" fill="url(#medallion-fill)"/>
  </g>

  <g transform="translate(280,200)">
    <rect x="0" y="0" width="200" height="100" rx="8" ry="8" fill="url(#bg-emerald)" stroke="#1a1620" stroke-width="1" filter="url(#glow-emerald)"/>
    <rect x="1" y="1" width="198" height="98" rx="7" ry="7" fill="none" stroke="#05080f" stroke-opacity="0.5" stroke-width="2"/>
    <text x="100" y="55" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="14" font-weight="700" fill="#f6f2e6" letter-spacing="2">EMERALD</text>
    <circle cx="0"   cy="0"   r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="200" cy="0"   r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="0"   cy="100" r="6" fill="url(#medallion-fill-iron)"/>
    <circle cx="200" cy="100" r="6" fill="url(#medallion-fill-iron)"/>
  </g>
</svg>
